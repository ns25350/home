<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ns25350 | Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Orbitron', sans-serif;
    background: #0a0a0f;
    color: white;
    overflow-x: hidden;
}

/* ===== ローディング画面 ===== */
#loader {
    position: fixed;
    width: 100%;
    height: 100vh;
    background: #0a0a0f;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
    flex-direction: column;
}

.loader-text {
    font-size: 40px;
    font-weight: 900;
    color: #00f0ff;
    animation: glitch 1s infinite;
}

.loader-bar {
    margin-top: 20px;
    width: 200px;
    height: 3px;
    background: #222;
    overflow: hidden;
}

.loader-bar span {
    display: block;
    height: 100%;
    width: 0;
    background: #00f0ff;
    animation: load 2s forwards;
}

@keyframes load {
    to { width: 100%; }
}

@keyframes glitch {
    0% { text-shadow: 2px 0 #00f0ff; }
    25% { text-shadow: -2px 0 #ff00ff; }
    50% { text-shadow: 2px 0 #00f0ff; }
    75% { text-shadow: -2px 0 #ff00ff; }
    100% { text-shadow: 2px 0 #00f0ff; }
}

/* ===== 初期非表示 ===== */
.hidden {
    opacity: 0;
    transform: translateY(30px);
}

.show {
    opacity: 1;
    transform: translateY(0);
    transition: 1s ease;
}

/* ===== ナビ ===== */
nav {
    position: fixed;
    width: 100%;
    top: 0;
    left: 0;
    padding: 20px 60px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(10,10,15,0.6);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid #00f0ff44;
}

nav h1 {
    font-weight: 900;
    color: #00f0ff;
}

/* ===== ヒーロー ===== */
.hero {
    height: 100vh;
    display: flex;
    align-items: center;
    padding-left: 10%;
}

.hero h2 {
    font-size: 80px;
    font-weight: 900;
}

.hero span {
    color: #00f0ff;
    text-shadow: 0 0 15px #00f0ff;
}

/* ===== セクション ===== */
.section {
    padding: 120px 10%;
}

.card {
    background: #111118;
    padding: 30px;
    border: 1px solid #00f0ff33;
    margin-bottom: 30px;
    transition: 0.3s;
}

.card:hover {
    box-shadow: 0 0 20px #00f0ff55;
    border-color: #00f0ff;
}
</style>
</head>
<body>

<div id="loader">
    <div class="loader-text">ns25350 SYSTEM</div>
    <div class="loader-bar"><span></span></div>
</div>

<nav class="hidden">
    <h1>ns25350</h1>
</nav>

<section class="hero hidden">
    <h2>HELLO.<br>I'm <span>ns25350</span></h2>
</section>

<section class="section hidden">
    <div class="card">
        Cyber Style Portfolio Site.
    </div>
</section>

<script>
window.addEventListener("load", () => {
    setTimeout(() => {
        document.getElementById("loader").style.display = "none";

        document.querySelectorAll(".hidden").forEach((el, i) => {
            setTimeout(() => {
                el.classList.add("show");
            }, i * 300);
        });

    }, 2000);
});
</script>

</body>
</html>
